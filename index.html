<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简易商品购物页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }
    .container {
      width: 90%;
      margin: 30px auto;
    }
    .title {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }
    .product-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .product-card {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .product-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .product-card h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    .price {
      color: #f56c6c;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .add-btn {
      width: 100%;
      padding: 8px 0;
      background: #409eff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .add-btn:hover {
      background: #337ecc;
    }
    .cart h3 {
      margin-bottom: 15px;
    }
    .cart-item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">简易商品购物页面</h1>

    <div class="product-list" id="productList"></div>

    <div class="cart">
      <h3>购物车</h3>
      <div id="cartList"></div>
    </div>
  </div>

  <script>
    // 商品数据：每个商品自带图片名字，你随便改！
    const products = [
      { id: 1, name: "商品1", price: 99,  img: "地球仪.jpg" },
      { id: 2, name: "商品2", price: 199, img: "电子宠物.jpg" },
      { id: 3, name: "商品3", price: 299, img: "耳麦.jpg" },
      { id: 4, name: "商品4", price: 399, img: "光碟.jpg" },
      { id: 5, name: "商品5", price: 499, img: "蓝粉棒棒糖.jpg" },
      { id: 6, name: "商品6", price: 599, img: "水晶苹果.jpg" },
    ];

    let cart = [];

    // 渲染商品列表
    function renderProducts() {
      const list = document.getElementById("productList");
      list.innerHTML = products.map(item => `
        <div class="product-card">
          <img src="${item.img}" alt="商品图片">
          <h3>${item.name}</h3>
          <div class="price">价格：¥${item.price}</div>
          <button class="add-btn" onclick="addToCart(${item.id})">加入购物车</button>
        </div>
      `).join("");
    }

    // 加入购物车
    function addToCart(id) {
      const product = products.find(p => p.id === id);
      cart.push(product);
      renderCart();
      alert("已加入购物车！");
    }

    // 渲染购物车
    function renderCart() {
      const cartList = document.getElementById("cartList");
      cartList.innerHTML = cart.map((item, index) => `
        <div class="cart-item">${index+1}. ${item.name} - ¥${item.price}</div>
      `).join("");
    }

    // 页面加载
    window.onload = function() {
      renderProducts();
    };
  </script>
</body>
</html>
